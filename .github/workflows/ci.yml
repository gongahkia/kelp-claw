name: Piranesi CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  core-required:
    name: core-required
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - run: uv sync --frozen
      - name: Capability preflight (core)
        run: uv run python scripts/ci_preflight.py --require-core --write-json ci-preflight.json
      - uses: actions/upload-artifact@v4
        with:
          name: ci-preflight-core
          path: ci-preflight.json
      - run: uv run python scripts/check_release_hygiene.py
      - name: Audit ground-truth metadata (global)
        run: |
          uv run python eval/ground_truth_audit.py \
            --gt-dir eval/ground_truth \
            --required-field discovery_method \
            --fail-on-missing
      - name: Audit ground-truth metadata (synthetic quality gate)
        run: |
          uv run python eval/ground_truth_audit.py \
            --gt-dir eval/ground_truth \
            --filter discovery_method=synthetic \
            --required-field language \
            --required-field framework \
            --fail-on-missing
      - name: Audit ground-truth metadata (CVE quality gate)
        run: |
          uv run python eval/ground_truth_audit.py \
            --gt-dir eval/ground_truth \
            --filter discovery_method=cve_mining \
            --required-field language \
            --fail-on-missing
      - name: Enrichability gate for ground-truth metadata
        run: |
          uv run python eval/ground_truth_enrich.py \
            --gt-dir eval/ground_truth \
            --field language \
            --field framework \
            --field taint_step_count \
            --fail-on-unresolved
      - name: Field-path metadata freshness gate
        run: |
          uv run python eval/ground_truth_enrich.py \
            --gt-dir eval/ground_truth \
            --field taint_field_path \
            --taint-field-candidates-only \
            --fail-on-unresolved \
            --fail-on-updates
      - name: Field-sensitive benchmark metadata gate
        run: |
          uv run python eval/ground_truth_audit.py \
            --gt-dir eval/ground_truth \
            --filter source_project=synthetic-phase31 \
            --required-field taint_field_path \
            --required-field field_sensitive_label \
            --fail-on-missing
      - run: uv run ruff check src/ tests/
      - run: uv run ruff format --check src/ tests/
      - run: uv run mypy src/piranesi/
      - name: Core deterministic test lane
        run: |
          uv run pytest \
            -m "not integration and not joern and not docker and not e2e and not slow" \
            --cov=piranesi \
            --cov-report=xml
        env:
          OPENAI_API_KEY: test
      - uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  critical-regressions:
    name: critical-regressions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - run: uv sync --frozen
      - name: Detection correctness regression gate
        run: |
          uv run pytest -q \
            tests/test_detect/test_flows.py::test_extract_candidate_findings_detects_local_query_helper_sqli \
            tests/test_detect/test_interprocedural.py

  security-regression:
    name: security-regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - run: uv sync --frozen
      - name: Security and artifact hygiene regression gate
        run: |
          uv run pytest -q \
            tests/test_llm/test_sanitize.py \
            tests/test_verify/test_verification_evidence.py \
            tests/test_legal/test_evidence.py \
            tests/test_known_limitations_registry.py

  extras-contract:
    name: extras-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - run: uv sync --frozen
      - name: Contract and schema drift gate
        run: |
          uv run python scripts/check_environment_markers.py --root tests
          uv run pytest -q \
            tests/test_contract_snapshots.py \
            tests/test_plugin.py::test_plugin_api_manifest_snapshot \
            tests/test_environment_marker_policy.py \
            tests/test_ci_templates.py \
            tests/test_release_hygiene.py

  integration-optional:
    name: integration-optional
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - run: uv sync --frozen
      - name: Capability preflight (integration)
        id: preflight
        run: uv run python scripts/ci_preflight.py --emit-github-outputs --write-json ci-preflight.json
      - uses: actions/upload-artifact@v4
        with:
          name: ci-preflight-integration
          path: ci-preflight.json
      - name: Run environment-bound integration tests
        if: steps.preflight.outputs.integration_ready == 'true'
        run: uv run pytest -m "integration or joern or docker or e2e"
        env:
          OPENAI_API_KEY: test
      - name: Skip note when integration capabilities are unavailable
        if: steps.preflight.outputs.integration_ready != 'true'
        run: echo "Skipping integration lane because Joern and Docker are unavailable."

  build:
    runs-on: ubuntu-latest
    needs: [core-required, critical-regressions, security-regression, extras-contract]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
