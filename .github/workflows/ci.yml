name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20.19.5"
          cache: pnpm

      - name: Set up Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.15.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify workspace
        run: pnpm verify

      - name: Validate workflow fixtures
        run: pnpm validate:fixtures

      - name: Check codegen dependency policy
        run: pnpm check:codegen-policy

      - name: Install Playwright Chromium
        run: pnpm --filter @kelpclaw/openclaw exec playwright install --with-deps chromium

      - name: Run OpenClaw E2E
        env:
          KELPCLAW_PLANNER_MODE: deterministic
          KELPCLAW_WORKFLOW_STORE: memory
        run: pnpm --filter @kelpclaw/openclaw test:e2e

      - name: Docker integration smoke
        if: ${{ runner.os == 'Linux' }}
        run: |
          docker info
          pnpm --filter @kelpclaw/nanoclaw test

      - name: Compose config smoke
        run: docker compose config --quiet
