name: Publish PyPI Package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build:
    name: Build and attest Python artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - run: uv sync --frozen
      - name: Check version and release metadata
        run: |
          uv run python scripts/check_release_hygiene.py
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            uv run python scripts/check_release_tag.py "${GITHUB_REF_NAME}"
          fi
      - name: Build artifacts, schemas, and checksums
        run: |
          uv build
          uv run piranesi schema host-report --output dist/host-report.schema.json
          uv run piranesi schema host-snapshot --output dist/host-snapshot.schema.json
          uv run piranesi schema fleet-report --output dist/fleet-report.schema.json
          shasum -a 256 dist/* > dist/SHA256SUMS
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

