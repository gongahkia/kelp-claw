[host.policy]
profile = "production-linux"
minimum_score = 85
max_severity = "medium"
max_risk = 75
allow_suppressed = true
suppression_expiry_required = true

[host.policy.fleet]
max_failed_hosts = 0
max_policy_failures = 0
minimum_passing_hosts_percent = 100

[[host.policy.required_evidence]]
name = "trivy"
required = true
action = "fail"

[[host.policy.required_evidence]]
name = "users"
required = true
action = "fail"

[[host.policy.required_evidence]]
name = "firewall"
required = true
action = "warn"

[[host.policy.required_evidence]]
name = "updates"
required = true
action = "warn"

[[host.policy.gates]]
id = "no-public-ssh-password-auth"
rule_id = "host.ssh.password_authentication"
when = "public_ssh"
max_severity = "low"
action = "fail"

[[host.policy.gates]]
id = "no-public-high-risk-services"
category = "exposure"
when = "public_listener"
max_risk = 70
action = "fail"
