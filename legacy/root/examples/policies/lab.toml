[host.policy]
profile = "lab"
minimum_score = 50
max_risk = 95
allow_suppressed = true

[[host.policy.required_evidence]]
name = "trivy"
required = true
action = "warn"

[[host.policy.gates]]
id = "public-ssh-password-auth-review"
rule_id = "host.ssh.password_authentication"
when = "public_ssh"
max_severity = "high"
action = "warn"

[[host.policy.allowed_exposure]]
port = 22
reason = "SSH is permitted in lab networks when credentials are hardened."
