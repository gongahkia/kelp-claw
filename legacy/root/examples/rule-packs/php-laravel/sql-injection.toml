# Example rule pack: PHP/Laravel SQL injection
# This is a learning scaffold, not a production-complete policy.

[rule]
id = "example-php-laravel-sqli"
name = "Laravel raw query built from request input"
schema_version = "1"
category = "injection"
cwe_id = "CWE-89"
severity = "high"
description = "Example rule showing request parameters used in raw SQL execution APIs in Laravel-style code."
author = "piranesi-example-packs"
version = "0.1.0"
tags = ["example", "php", "laravel", "sqli", "query-builder"]

[rule.source]
pattern = '\$request\s*->\s*(?:input|query|get)\s*\('
type = "regex"

[rule.sink]
pattern = '\b(?:DB|\$query|\$builder)\s*->\s*(?:select|statement|whereRaw|orderByRaw)\s*\('
type = "regex"

[rule.sanitizers]
patterns = ['\b(?:intval|filter_var|ctype_digit)\s*\(']
type = "regex"

[rule.message]
template = "Example pack: request-controlled SQL fragment from `{source}` reaches `{sink}`."
