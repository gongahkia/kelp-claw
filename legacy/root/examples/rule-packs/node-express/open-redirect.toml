# Example rule pack: Node/Express open redirect
# This is a learning scaffold, not a production-complete policy.

[rule]
id = "example-node-express-open-redirect"
name = "Express open redirect from request input"
schema_version = "1"
category = "redirect"
cwe_id = "CWE-601"
severity = "medium"
description = "Example rule showing how request-derived redirect targets can reach Express redirect sinks with receiver constraints."
author = "piranesi-example-packs"
version = "0.1.0"
tags = ["example", "node", "express", "open-redirect", "receiver-constrained"]

[rule.source]
pattern = 'cpg.call.name("body|query|params").where(_.argument.code("req\\..*"))'
type = "cpgql"

[rule.sink]
pattern = 'cpg.call.name("redirect").where(_.receiver.code("res|reply"))'
type = "cpgql"

[rule.sanitizers]
patterns = ['cpg.call.name("isTrustedRedirect|allowlistedRedirect")']
type = "cpgql"

[rule.message]
template = "Example pack: request-derived redirect target from `{source}` reaches constrained redirect sink `{sink}`."
