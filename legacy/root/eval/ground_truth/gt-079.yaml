taint_source: user-supplied url argument to res.location()/res.redirect()
taint_sink: Location header via this.set('Location', ...)
taint_path:
- An application passes an attacker-controlled redirect target into res.redirect(target)
- res.location() stringifies it to loc and computes encodedUrl = encodeUrl(loc) (lib/response.js:908-916)
- the host-preservation guard only reasons about the pre-encoded and post-encoded host for explicit http(s) strings (lib/response.js:917-924)
- this.set('Location', encodedUrl) emits the rewritten redirect target (lib/response.js:933)
complexity: ctx
exploitable: true
reference_exploit: In an app that allowlists redirects before calling res.redirect(userUrl), supply a backslash-crafted URL that passes validation pre-encoding but is interpreted by the browser as an external redirect after Express encodes it
reference_fix_commit: d36495d7e666f30c06fbb0e039771c5267d7d1d4
notes: CVE-2024-29041. Vulnerable release 4.19.1, fixed in 4.19.2 by changing how res.location() encodes the path segment after the authority component.
