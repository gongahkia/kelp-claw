taint_source: req.headers['content-type']
taint_sink: forwarded upstream request headers/body pair
taint_path:
- reply.from() reads the attacker-controlled Content-Type header from req.headers['content-type'] (index.js:110)
- The vulnerable parser lowercases and truncates only on the first semicolon instead of performing RFC-compliant parsing (index.js:114-117)
- The plugin decides whether to JSON-encode the body from this malformed plainContentType check (index.js:118-120)
- It then forwards the original attacker-controlled content-type header alongside the rewritten body (index.js:123,173)
complexity: ctx
exploitable: true
reference_exploit: Send a malformed Content-Type such as application/json ;charset=utf-8 so reply-from misclassifies the body and forwards a mismatched header/body pair to the upstream service
reference_fix_commit: c95ea2f4b6c6379a17b7cb78eb1275e158b85712
notes: CVE-2023-51701. Fixed in 9.6.0 by switching to fast-content-type-parse for robust Content-Type parsing before proxy forwarding.
