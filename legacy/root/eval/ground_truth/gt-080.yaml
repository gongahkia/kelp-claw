taint_source: request pathname beginning with // plus attacker-controlled relative redirect argument
taint_sink: Location header via this.set('Location', url)
taint_path:
- An attacker controls the request path so parseUrl.original(req).pathname begins with // (for example, //evil.example/...)
- The application passes a user-controlled relative redirect such as ./login into res.redirect()
- res.location() enters the relative-path branch and uses parseUrl.original(req).pathname as the base path (lib/response.js:711-716)
- resolve(path, url) produces a protocol-relative redirect target
- this.set('Location', url) emits an attacker-controlled external redirect (lib/response.js:725)
complexity: ctx
exploitable: true
reference_exploit: Request a route via a path beginning with //evil.example/ and trigger res.redirect('./login'); the resulting Location header points at the attacker-controlled host
