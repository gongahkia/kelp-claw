[rule]
id = "community.ssh.password-authentication-enabled"
title = "SSH password authentication should be disabled"
category = "ssh"
severity = "medium"
confidence = 0.9
platform_support = ["debian", "ubuntu", "rhel", "amazon-linux"]
control_refs = ["CIS SSH hardening", "NIST CSF PR.AA"]
documentation_url = "https://www.ssh.com/academy/ssh/sshd_config"

[[match]]
evidence = "config.ssh.PasswordAuthentication"
equals = "yes"

[remediation]
text = "Set PasswordAuthentication no after confirming key-based access, then reload or restart sshd through the normal change process."
verification = "Collect SSH daemon configuration evidence again and rerun piranesi host rule test."

[metadata]
maintainer = "piranesi-maintainers"
fixture = "tests/fixtures/host/debian-vulnerable"
expected_finding_ids = ["host-c4e5e125f8bbe7e4"]
false_positive_notes = "Password authentication may be acceptable only behind documented compensating controls such as bastion MFA and source allowlisting."
mapping_confidence = 0.68
last_validation_date = 2026-05-14
tags = ["ssh", "authentication", "community"]
