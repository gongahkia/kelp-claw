# Community Rule Template
# Copy this file to {framework_name}.toml and fill in the fields.
# Files prefixed with _ are excluded from auto-discovery.
# See docs/contributing-rules.md for the full guide.

[[rules]]
rule_id = "framework_section_description"       # unique id, e.g. "ccpa_1798_100_disclosure"
framework = "FRAMEWORK"                         # framework key, e.g. "CCPA", "GDPR"
section = "Section X (Title)"                   # statutory section, e.g. "Article 32 (Security of Processing)"
obligation_text = "Describe the obligation citing the specific statutory provision."
consequences = ["remediate", "document"]        # actions: remediate, document, review, notify_regulator, notify_individuals
penalty_range = "Up to $X per violation"        # cite the statute's penalty range

# --- optional fields below ---

# notification_timeline = "72 hours"            # time-bound notification requirement
# enforcement_precedents = []                   # notable enforcement actions
# cross_references = []                         # related rule_ids in this or other frameworks
# severity_modifier = "standard"                # "standard" or "aggravated"
# vuln_classes = ["CWE-89", "CWE-79"]           # CWE IDs that trigger this rule
# data_categories = ["health", "biometric"]     # piranesi data categories
# requires_rule_ids = []                        # rule_ids that must fire first (chaining)
# requires_boolean_facts = []                   # ALL must be true: is_healthcare_entity, is_high_risk_ai, etc.
# requires_any_boolean_facts = []               # ANY must be true
# affected_individuals_gte = 500                # minimum affected individuals threshold
