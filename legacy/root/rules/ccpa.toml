[[rules]]
rule_id = "ccpa_1798_100_disclosure"
framework = "CCPA"
section = "Cal. Civ. Code Section 1798.100"
vuln_classes = ["CWE-89", "CWE-79", "CWE-78", "CWE-22"]
data_categories = [
  "nric",
  "fin",
  "biometric",
  "health",
  "financial",
  "financial_bank",
  "financial_credit_card",
  "financial_income",
  "contact",
  "contact_phone",
  "contact_email",
  "contact_address",
  "race",
  "religion",
  "dob",
  "name",
  "username",
]
obligation_text = "Cal. Civ. Code Section 1798.100 gives California consumers the right to know the categories and specific pieces of personal information a business collects, uses, discloses, or sells. A confirmed exploitable vulnerability affecting personal information requires the business to document what information was exposed and prepare to answer consumer disclosure requests."
consequences = ["remediate", "document", "review"]
penalty_range = "Enforced through Cal. Civ. Code Section 1798.155; no standalone private damages under Section 1798.100"
enforcement_precedents = []
cross_references = []
severity_modifier = "standard"

[[rules]]
rule_id = "ccpa_1798_105_categories"
framework = "CCPA"
section = "Cal. Civ. Code Section 1798.105"
vuln_classes = ["CWE-89", "CWE-79", "CWE-78", "CWE-22"]
data_categories = [
  "nric",
  "fin",
  "biometric",
  "health",
  "financial",
  "financial_bank",
  "financial_credit_card",
  "financial_income",
  "race",
  "religion",
]
obligation_text = "Cal. Civ. Code Section 1798.105 gives consumers the right to request deletion of personal information collected from them. Where a confirmed vulnerability exposes sensitive personal information, the business should preserve only what is necessary for incident response and legal retention needs while preparing to honor deletion requests for the affected dataset."
consequences = ["remediate", "document", "review"]
penalty_range = "Enforced through Cal. Civ. Code Section 1798.155; no standalone private damages under Section 1798.105"
enforcement_precedents = []
cross_references = ["ccpa_1798_100_disclosure"]
severity_modifier = "heightened"

[[rules]]
rule_id = "ccpa_1798_150_damages"
framework = "CCPA"
section = "Cal. Civ. Code Section 1798.150"
vuln_classes = ["CWE-89", "CWE-79", "CWE-78", "CWE-22"]
data_categories = [
  "nric",
  "fin",
  "biometric",
  "health",
  "financial",
  "financial_bank",
  "financial_credit_card",
  "financial_income",
]
requires_boolean_facts = ["no_encryption_at_rest"]
obligation_text = "Cal. Civ. Code Section 1798.150 permits a private right of action when a business fails to implement reasonable security and a breach exposes nonencrypted and nonredacted personal information. A confirmed vulnerability affecting government ID, biometric, health, or financial data without encryption at rest creates statutory-damages exposure."
consequences = ["remediate", "document", "review", "notify_individuals"]
penalty_range = "$100-$750 per consumer per incident, or actual damages, whichever is greater"
enforcement_precedents = []
cross_references = ["ccpa_1798_100_disclosure", "ccpa_1798_105_categories"]
severity_modifier = "aggravated"

[[rules]]
rule_id = "ccpa_1798_155_standard"
framework = "CCPA"
section = "Cal. Civ. Code Section 1798.155"
requires_rule_ids = ["ccpa_1798_100_disclosure"]
obligation_text = "Cal. Civ. Code Section 1798.155 authorizes administrative enforcement for violations of the CCPA/CPRA. A confirmed vulnerability affecting California consumer personal information can expose the business to enforcement if its controls, disclosures, or response measures are deficient."
consequences = ["remediate", "document", "review"]
penalty_range = "Up to $2,500 per violation"
enforcement_precedents = []
cross_references = ["ccpa_1798_100_disclosure"]
severity_modifier = "standard"

[[rules]]
rule_id = "ccpa_1798_155_aggravated"
framework = "CCPA"
section = "Cal. Civ. Code Section 1798.155"
requires_rule_ids = ["ccpa_1798_155_standard"]
requires_boolean_facts = ["willful_violation"]
obligation_text = "Where the violation is intentional or willful, Cal. Civ. Code Section 1798.155 permits the enhanced penalty tier. A business that knowingly leaves a confirmed exploitable path unaddressed after awareness of the violation faces higher enforcement exposure."
consequences = ["remediate", "document", "review"]
penalty_range = "Up to $7,500 per intentional violation"
enforcement_precedents = []
cross_references = ["ccpa_1798_155_standard"]
severity_modifier = "aggravated"

[[rules]]
rule_id = "ccpa_1798_185_sensitive"
framework = "CCPA"
section = "Cal. Civ. Code Section 1798.185"
vuln_classes = ["CWE-89", "CWE-79", "CWE-78", "CWE-22"]
data_categories = [
  "nric",
  "fin",
  "biometric",
  "health",
  "financial",
  "financial_bank",
  "financial_credit_card",
  "financial_income",
  "race",
  "religion",
]
obligation_text = "Cal. Civ. Code Section 1798.185 directs regulations governing the use and disclosure of sensitive personal information. A confirmed vulnerability affecting government ID, biometric, health, financial, race, or religion data requires heightened controls and limitation of use or disclosure to what is necessary and proportionate."
consequences = ["remediate", "document", "review"]
penalty_range = "Enforced through Cal. Civ. Code Section 1798.155; heightened scrutiny applies to sensitive personal information handling"
enforcement_precedents = []
cross_references = ["ccpa_1798_105_categories"]
severity_modifier = "heightened"
