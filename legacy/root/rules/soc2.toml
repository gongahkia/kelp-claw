[[rules]]
rule_id = "soc2_cc6_1_auth_bypass"
framework = "SOC2"
section = "CC6.1"
control_name = "Logical Access Security"
vuln_classes = ["CWE-287", "CWE-306"]
obligation_text = "SOC 2 CC6.1 requires logical access controls that identify, authenticate, and authorize system users before access is granted. Authentication bypasses or missing authentication indicate a control gap in how the application restricts access to system resources."
consequences = ["remediate", "document", "review"]
penalty_range = "Audit exception, control deficiency, or qualified SOC 2 report depending on severity and remediation timeliness"
enforcement_precedents = []
cross_references = []
severity_modifier = "standard"
evidence_template = "soc2_cc6_1_finding"

