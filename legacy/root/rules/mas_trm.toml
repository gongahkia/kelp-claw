[[rules]]
rule_id = "mas_trm_11_1_reliability"
framework = "MAS_TRM"
section = "Section 11.1 (System Reliability)"
vuln_classes = ["CWE-89", "CWE-79", "CWE-78", "CWE-22"]
data_categories = ["financial", "financial_bank", "financial_credit_card", "financial_income"]
obligation_text = "MAS TRM Guidelines Section 11.1 requires a financial institution to ensure its IT systems are reliable and have the capacity to process current and projected business volumes under normal and peak operating conditions. A confirmed exploitable vulnerability undermines that reliability by exposing the system to potential disruption via exploitation. As MAS TRM is a supervisory guideline rather than a statute, concerns are typically addressed through supervisory action instead of a direct statutory fine."
consequences = ["remediate", "review", "document"]
penalty_range = "Guidelines; supervisory action rather than a direct financial penalty (for example directions, license conditions, or business restrictions)"
enforcement_precedents = [
  "MAS typically addresses technology risk management deficiencies through supervisory engagement and institution-specific actions rather than published penalty decisions.",
]
cross_references = []

[[rules]]
rule_id = "mas_trm_11_2_recoverability"
framework = "MAS_TRM"
section = "Section 11.2 (System Recoverability)"
vuln_classes = ["CWE-78", "CWE-22"]
data_categories = ["financial", "financial_bank", "financial_credit_card", "financial_income"]
obligation_text = "MAS TRM Guidelines Section 11.2 requires a financial institution to establish recovery strategies and disaster recovery plans so IT systems and services can be recovered in a timely manner. Command injection and path traversal can compromise system integrity and complicate recovery by enabling arbitrary command execution or file manipulation. As MAS TRM is supervisory guidance rather than statute, the expected response is remediation and supervisory follow-up rather than a direct statutory penalty."
consequences = ["remediate", "review", "document"]
penalty_range = "Guidelines; supervisory action rather than a direct financial penalty"
enforcement_precedents = []
cross_references = ["mas_trm_11_1_reliability"]

[[rules]]
rule_id = "mas_trm_11_0_5_controls"
framework = "MAS_TRM"
section = "Section 11.0.5 (Adequate Controls)"
vuln_classes = ["CWE-89", "CWE-79", "CWE-78"]
data_categories = ["financial", "financial_bank", "financial_credit_card", "financial_income"]
obligation_text = "MAS TRM Guidelines Section 11.0.5 requires a financial institution to implement adequate controls to mitigate risks arising from the use of IT. Injection vulnerabilities, including SQL injection, cross-site scripting, and command injection, indicate inadequate input validation and control design. As MAS TRM is supervisory guidance rather than statute, remediation is ordinarily enforced through supervisory action rather than a direct statutory fine."
consequences = ["remediate", "review"]
penalty_range = "Guidelines; supervisory action rather than a direct financial penalty"
enforcement_precedents = []
cross_references = ["mas_trm_11_1_reliability"]
