[[rules]]
rule_id = "gdpr_art32_security"
framework = "GDPR"
section = "Article 32"
vuln_classes = ["CWE-89", "CWE-79", "CWE-78", "CWE-22"]
data_categories = [
  "nric",
  "fin",
  "biometric",
  "genetic",
  "health",
  "political",
  "trade_union",
  "sexual_orientation",
  "financial",
  "financial_bank",
  "financial_credit_card",
  "financial_income",
  "employment",
  "criminal",
  "contact",
  "contact_phone",
  "contact_email",
  "contact_address",
  "dob",
  "nationality",
  "race",
  "religion",
  "name",
  "username",
  "public",
  "public_info",
]
obligation_text = "Article 32(1) requires controllers and processors to implement appropriate technical and organisational measures to ensure a level of security appropriate to the risk. A confirmed exploitable vulnerability affecting systems processing personal data indicates that the deployed measures were not appropriate to the risk of unauthorised disclosure, alteration, or access."
consequences = ["remediate", "document", "review"]
penalty_range = "Up to EUR 10,000,000 or 2% of total worldwide annual turnover"
enforcement_precedents = []
cross_references = []
severity_modifier = "standard"

[[rules]]
rule_id = "gdpr_art32_encryption"
framework = "GDPR"
section = "Article 32(1)(a)"
vuln_classes = ["CWE-89", "CWE-79", "CWE-78", "CWE-22"]
data_categories = [
  "nric",
  "fin",
  "biometric",
  "genetic",
  "health",
  "political",
  "trade_union",
  "sexual_orientation",
  "financial",
  "financial_bank",
  "financial_credit_card",
  "financial_income",
  "employment",
  "criminal",
  "contact",
  "contact_phone",
  "contact_email",
  "contact_address",
  "dob",
  "nationality",
  "race",
  "religion",
  "name",
  "username",
  "public",
  "public_info",
]
requires_boolean_facts = ["no_encryption_at_rest"]
obligation_text = "Article 32(1)(a) identifies pseudonymisation and encryption of personal data as appropriate measures. Where a confirmed exploitable vulnerability affects personal data stored or transmitted without encryption at rest, the absence of encryption indicates that a key protective measure was not implemented."
consequences = ["remediate", "document", "review"]
penalty_range = "Up to EUR 10,000,000 or 2% of total worldwide annual turnover"
enforcement_precedents = []
cross_references = ["gdpr_art32_security", "gdpr_art83_standard"]
severity_modifier = "aggravated"

[[rules]]
rule_id = "gdpr_art33_notification"
framework = "GDPR"
section = "Article 33"
requires_rule_ids = ["gdpr_art32_security"]
requires_boolean_facts = ["likely_risk_to_rights"]
obligation_text = "Article 33(1) requires the controller to notify the competent supervisory authority of a personal data breach unless the breach is unlikely to result in a risk to the rights and freedoms of natural persons. Once the breach is assessed as likely to result in such a risk, notification is required without undue delay and, where feasible, within 72 hours."
consequences = ["notify_regulator", "document"]
penalty_range = "Up to EUR 10,000,000 or 2% of total worldwide annual turnover"
notification_timeline = "72 hours after becoming aware of the personal data breach"
enforcement_precedents = []
cross_references = ["gdpr_art32_security"]

[[rules]]
rule_id = "gdpr_art34_communication"
framework = "GDPR"
section = "Article 34"
requires_rule_ids = ["gdpr_art33_notification"]
requires_boolean_facts = ["high_risk_to_individuals"]
obligation_text = "Article 34(1) requires communication of the personal data breach to affected data subjects when the breach is likely to result in a high risk to their rights and freedoms. The communication must be made without undue delay and describe the nature of the breach and recommended mitigation steps in clear and plain language."
consequences = ["notify_individuals", "document"]
penalty_range = "Up to EUR 10,000,000 or 2% of total worldwide annual turnover"
notification_timeline = "Without undue delay"
enforcement_precedents = []
cross_references = ["gdpr_art33_notification"]

[[rules]]
rule_id = "gdpr_art83_standard"
framework = "GDPR"
section = "Article 83(4)"
requires_rule_ids = ["gdpr_art32_security"]
obligation_text = "Violations of controller and processor security and breach-notification obligations, including Articles 32 to 34, are subject to the standard administrative fine tier under Article 83(4). A confirmed Article 32 security failure creates exposure to this penalty range."
consequences = ["document", "review"]
penalty_range = "Up to EUR 10,000,000 or 2% of total worldwide annual turnover"
enforcement_precedents = []
cross_references = ["gdpr_art32_security", "gdpr_art32_encryption", "gdpr_art33_notification", "gdpr_art34_communication"]
severity_modifier = "standard"

[[rules]]
rule_id = "gdpr_art83_aggravated"
framework = "GDPR"
section = "Article 83(5)"
requires_rule_ids = ["gdpr_art32_security"]
requires_boolean_facts = ["basic_processing_principle_violation"]
obligation_text = "Article 83(5) applies the aggravated administrative fine tier to infringements of the basic principles for processing personal data. Where a confirmed breach also reflects a violation of the core processing principles, the organisation faces the higher statutory penalty range."
consequences = ["document", "review", "notify_regulator"]
penalty_range = "Up to EUR 20,000,000 or 4% of total worldwide annual turnover"
enforcement_precedents = []
cross_references = ["gdpr_art32_security"]
severity_modifier = "aggravated"

[[rules]]
rule_id = "gdpr_art83_special"
framework = "GDPR"
section = "Article 83(5) + Article 9"
requires_rule_ids = ["gdpr_art32_security"]
data_categories = [
  "race",
  "nationality",
  "political",
  "religion",
  "trade_union",
  "genetic",
  "biometric",
  "health",
  "sexual_orientation",
]
obligation_text = "Processing breaches involving Article 9 special category data materially increase GDPR exposure. Where a confirmed exploitable vulnerability affects data revealing racial or ethnic origin, political opinions, religious beliefs, trade union membership, genetic data, biometric data, health data, or a person's sex life or sexual orientation, Article 83(5) exposes the organisation to the aggravated administrative fine tier."
consequences = ["document", "review", "notify_individuals"]
penalty_range = "Up to EUR 20,000,000 or 4% of total worldwide annual turnover"
enforcement_precedents = []
cross_references = ["gdpr_art32_security", "gdpr_art83_aggravated"]
severity_modifier = "aggravated"
