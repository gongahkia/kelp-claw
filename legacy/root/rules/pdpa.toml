[[rules]]
rule_id = "pdpa_s24_standard"
framework = "PDPA"
section = "Section 24"
vuln_classes = ["CWE-89", "CWE-79", "CWE-78", "CWE-22"]
data_categories = [
  "nric",
  "fin",
  "biometric",
  "genetic",
  "health",
  "financial",
  "financial_bank",
  "financial_credit_card",
  "financial_income",
  "employment",
  "criminal",
  "contact",
  "contact_phone",
  "contact_email",
  "contact_address",
  "dob",
  "nationality",
  "race",
  "religion",
  "name",
  "username",
  "public_info",
]
obligation_text = "Section 24 requires organisations to protect personal data by making reasonable security arrangements to prevent unauthorised access, collection, use, disclosure, copying, modification, disposal or similar risks. A confirmed exploitable vulnerability in a system processing personal data constitutes a failure to make reasonable security arrangements."
consequences = ["remediate", "document"]
penalty_range = "Up to $1,000,000"
enforcement_precedents = [
  "[2019] SGPDPC 7 (SingHealth) -- failure to implement adequate security measures for a patient database system, resulting in unauthorised access to 1.5M patient records",
  "[2020] SGPDPC 1 (Grab) -- inadequate protection of personal data due to insufficient access controls in application",
]
cross_references = []
severity_modifier = "standard"

[[rules]]
rule_id = "pdpa_s24_aggravated_tier1"
framework = "PDPA"
section = "Section 24"
vuln_classes = ["CWE-89", "CWE-79", "CWE-78", "CWE-22"]
data_categories = ["nric", "fin", "biometric", "genetic", "health"]
obligation_text = "Section 24 protection obligation with aggravated concern: the vulnerable system processes Tier 1 personal data, including NRIC or FIN identifiers, biometric data, genetic data, or health data. The PDPC has consistently held that organisations handling high-sensitivity data are expected to implement commensurately stronger security measures. Failure to do so may attract penalties at the higher end of the statutory range."
consequences = ["remediate", "document", "review"]
penalty_range = "Up to $1,000,000 (higher end expected for Tier 1 data)"
enforcement_precedents = [
  "[2019] SGPDPC 7 (SingHealth) -- highest financial penalty ($250,000 to IHiS, $250,000 to SingHealth) for breach involving health and medical data",
]
cross_references = ["pdpa_s24_standard"]
severity_modifier = "aggravated"

[[rules]]
rule_id = "pdpa_s24_no_encryption"
framework = "PDPA"
section = "Section 24"
vuln_classes = ["CWE-89", "CWE-79", "CWE-78", "CWE-22"]
data_categories = [
  "nric",
  "fin",
  "biometric",
  "genetic",
  "health",
  "financial",
  "financial_bank",
  "financial_credit_card",
  "financial_income",
]
requires_boolean_facts = ["no_encryption_at_rest"]
obligation_text = "Section 24 requires reasonable security arrangements. The PDPC Advisory Guidelines on the PDPA for Selected Topics (revised 2021) identify encryption as a reasonable security measure for high-sensitivity personal data. Absence of encryption for Tier 1 or Tier 2 personal data in a system with confirmed vulnerabilities represents an additional failure of reasonable security arrangements."
consequences = ["remediate", "document"]
penalty_range = "Up to $1,000,000"
enforcement_precedents = [
  "[2019] SGPDPC 7 (SingHealth) -- PDPC noted lack of encryption as an aggravating factor in assessing penalty",
]
cross_references = ["pdpa_s24_standard"]
severity_modifier = "aggravated"

[[rules]]
rule_id = "pdpa_s26d_notification"
framework = "PDPA"
section = "Section 26D"
requires_rule_ids = ["pdpa_s24_standard"]
affected_individuals_gte = 500
obligation_text = "Section 26D(1) of the PDPA requires an organisation to notify the PDPC of a notifiable data breach where the breach affects 500 or more individuals or is of a significant scale. Notification must be made within 3 calendar days of the organisation's assessment that the breach is notifiable."
consequences = ["notify_regulator", "notify_individuals"]
penalty_range = "Up to $1,000,000 (separate from S24 penalty)"
notification_timeline = "3 calendar days from assessment of breach as notifiable"
enforcement_precedents = [
  "[2021] SGPDPC 14 (Commeasure) -- failure to notify PDPC within the stipulated timeframe resulted in additional directions",
]
cross_references = ["pdpa_s24_standard", "pdpa_s24_aggravated_tier1"]

[[rules]]
rule_id = "pdpa_s24_s25_third_party"
framework = "PDPA"
section = "Section 24 + Section 25"
requires_rule_ids = ["pdpa_s24_standard"]
requires_boolean_facts = ["third_party_processor"]
obligation_text = "Where personal data is transferred to a third-party data intermediary or processor through a vulnerable path, the organisation bears dual obligations. Section 24 requires the organisation to ensure the processor provides a comparable standard of protection, and Section 25 requires the organisation to ensure the processor ceases to retain the personal data when no longer necessary. A vulnerability exposing data to a third party may compromise both obligations."
consequences = ["remediate", "document", "review"]
penalty_range = "Up to $1,000,000 (per section; cumulative exposure possible)"
enforcement_precedents = [
  "[2020] SGPDPC 1 (Grab) -- PDPC considered data sharing with third-party service providers as a factor in assessing adequacy of protection measures",
]
cross_references = ["pdpa_s24_standard"]
