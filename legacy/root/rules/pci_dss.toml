[[rules]]
rule_id = "pci_dss_req_3_4_stored_data"
framework = "PCI_DSS"
section = "Req 3.4"
control_name = "Protect Stored Account Data"
scope_guard = "is_payment_processing"
vuln_classes = ["CWE-327", "CWE-326", "CWE-312"]
obligation_text = "PCI-DSS Req 3.4 requires primary account numbers and related account data to be rendered unreadable wherever stored. Weak cryptography, inadequate key size, or cleartext storage findings indicate that stored account data protections are insufficient."
consequences = ["remediate", "document", "review"]
penalty_range = "PCI assessment failure, compensating-control burden, brand fines, or increased transaction scrutiny"
enforcement_precedents = []
cross_references = []
severity_modifier = "aggravated"
evidence_template = "pci_dss_req_3_4_finding"

