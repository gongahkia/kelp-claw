[[rules]]
rule_id = "iso27001_a8_3_auth_bypass"
framework = "ISO_27001"
section = "A.8.3 Information Access Restriction"
vuln_classes = ["CWE-287", "CWE-306"]
obligation_text = "ISO 27001 Annex A control A.8.3 requires restricting access to information and supporting assets in line with business and information security requirements. Authentication bypass findings show that application-layer access restriction controls are ineffective."
consequences = ["remediate", "document", "review"]
penalty_range = "ISO 27001 Annex A control gap; corrective action and audit evidence required."

[[rules]]
rule_id = "iso27001_a8_3_idor"
framework = "ISO_27001"
section = "A.8.3 Information Access Restriction"
vuln_classes = ["CWE-639", "CWE-862"]
obligation_text = "ISO 27001 Annex A control A.8.3 requires restricting access to information and supporting assets in line with business and information security requirements. Object-level authorization failures show that access restriction controls are incomplete or ineffective."
consequences = ["remediate", "document", "review"]
penalty_range = "ISO 27001 Annex A control gap; corrective action and audit evidence required."

[[rules]]
