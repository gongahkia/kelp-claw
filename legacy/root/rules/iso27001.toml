section = "A.8.4 Access to Source Code"
vuln_classes = ["CWE-540", "CWE-615"]
obligation_text = "ISO 27001 Annex A control A.8.4 requires restricting access to source code and associated sensitive implementation detail. Findings that expose source code or secrets in comments and artifacts show that source protection controls are not operating effectively."
consequences = ["remediate", "document", "review"]
penalty_range = "ISO 27001 Annex A control gap; corrective action and audit evidence required."

[[rules]]
