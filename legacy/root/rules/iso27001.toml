[[rules]]
rule_id = "iso27001_a8_4_hardcoded_secrets"
framework = "ISO_27001"
section = "A.8.4 Access to Source Code"
vuln_classes = ["CWE-798"]
obligation_text = "ISO 27001 Annex A control A.8.4 requires restricting access to source code and associated secrets. Hardcoded credentials show that sensitive authentication material is embedded in source artifacts instead of being access controlled and rotated through secure channels."
consequences = ["remediate", "document", "review"]
penalty_range = "ISO 27001 Annex A control gap; corrective action and audit evidence required."

[[rules]]
