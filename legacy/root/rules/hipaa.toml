[[rules]]
rule_id = "hipaa_164_312_access_control"
framework = "HIPAA"
section = "45 CFR 164.312(a)"
vuln_classes = ["CWE-89", "CWE-78", "CWE-79"]
data_categories = ["health"]
requires_boolean_facts = ["is_healthcare_entity"]
obligation_text = "The HIPAA Security Rule's access control standard requires covered entities and business associates to implement technical policies and procedures that allow access only to authorized persons or software programs. A confirmed injection vulnerability exposing protected health information indicates inadequate access control safeguards around electronic PHI."
consequences = ["remediate", "document", "review"]
penalty_range = "Tiered civil monetary penalties: $100-$50,000 per violation depending on culpability, with annual caps ranging from $25,000 to $1,500,000"
enforcement_precedents = []
cross_references = []

[[rules]]
rule_id = "hipaa_164_312_audit"
framework = "HIPAA"
section = "45 CFR 164.312(b)"
vuln_classes = ["CWE-89", "CWE-79", "CWE-78", "CWE-22", "CWE-918"]
data_categories = ["health"]
requires_boolean_facts = ["is_healthcare_entity"]
obligation_text = "The audit controls standard requires mechanisms to record and examine activity in systems that contain or use electronic protected health information. Any confirmed exploitable vulnerability affecting PHI requires covered entities and business associates to verify that access and disclosure activity can be logged, reviewed, and investigated."
consequences = ["remediate", "document", "review"]
penalty_range = "Tiered civil monetary penalties: $100-$50,000 per violation depending on culpability, with annual caps ranging from $25,000 to $1,500,000"
enforcement_precedents = []
cross_references = ["hipaa_164_312_access_control"]

[[rules]]
rule_id = "hipaa_164_312_integrity"
framework = "HIPAA"
section = "45 CFR 164.312(c)"
vuln_classes = ["CWE-78", "CWE-22"]
data_categories = ["health"]
requires_boolean_facts = ["is_healthcare_entity"]
obligation_text = "The integrity standard requires policies and procedures to protect electronic protected health information from improper alteration or destruction. Command injection and path traversal vulnerabilities create a direct risk of unauthorized modification or deletion of PHI and therefore implicate HIPAA integrity safeguards."
consequences = ["remediate", "document", "review"]
penalty_range = "Tiered civil monetary penalties: $100-$50,000 per violation depending on culpability, with annual caps ranging from $25,000 to $1,500,000"
enforcement_precedents = []
cross_references = ["hipaa_164_312_access_control", "hipaa_164_312_audit"]

[[rules]]
rule_id = "hipaa_164_312_transmission"
framework = "HIPAA"
section = "45 CFR 164.312(e)"
vuln_classes = ["CWE-79", "CWE-918"]
data_categories = ["health"]
requires_boolean_facts = ["is_healthcare_entity"]
obligation_text = "The transmission security standard requires technical safeguards to guard against unauthorized access to electronic protected health information transmitted over an electronic communications network. Cross-site scripting and server-side request forgery can expose PHI in transit or during browser-to-application and service-to-service transmission flows, requiring stronger transmission security controls such as encryption and integrity protection."
consequences = ["remediate", "document", "review"]
penalty_range = "Tiered civil monetary penalties: $100-$50,000 per violation depending on culpability, with annual caps ranging from $25,000 to $1,500,000"
enforcement_precedents = []
cross_references = ["hipaa_164_312_access_control", "hipaa_164_312_audit"]

[[rules]]
rule_id = "hipaa_164_408_breach_notification"
framework = "HIPAA"
section = "45 CFR 164.408"
data_categories = ["health"]
requires_rule_ids = ["hipaa_164_312_audit"]
requires_boolean_facts = ["is_healthcare_entity"]
affected_individuals_gte = 500
obligation_text = "For a breach involving unsecured protected health information affecting 500 or more individuals, HIPAA requires notification to the Secretary of Health and Human Services without unreasonable delay and in no case later than 60 calendar days after discovery of the breach."
consequences = ["notify_regulator", "notify_individuals", "document"]
penalty_range = "Tiered civil monetary penalties: $100-$50,000 per violation depending on culpability, with annual caps ranging from $25,000 to $1,500,000"
notification_timeline = "Without unreasonable delay and no later than 60 calendar days after discovery of the breach"
enforcement_precedents = []
cross_references = ["hipaa_164_312_audit"]
