[rule]
id = "custom-xml-001"
name = "Unsafe XML Parsing"
cwe_id = "CWE-611"
severity = "high"
description = "User-controlled XML is parsed with external entities enabled."
author = "security-team"
version = "1.0.0"
tags = ["xml", "xxe"]

[rule.source]
pattern = "req\\.body\\.xml"
type = "regex"

[rule.sink]
pattern = "parseXml\\("
type = "regex"

[rule.message]
template = "User input from `{source}` reaches `{sink}`."
