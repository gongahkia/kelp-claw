[rule]
id = "custom-ldap-001"
name = "LDAP Injection"
cwe_id = "CWE-90"
severity = "high"
description = "User input is interpolated into an LDAP query."
author = "security-team"
version = "1.0.0"
tags = ["ldap", "injection"]

[rule.source]
pattern = "req\\.query\\.username"
type = "regex"

[rule.sink]
pattern = "ldapsearch\\("
type = "regex"

[rule.message]
template = "User input from `{source}` reaches `{sink}`."
