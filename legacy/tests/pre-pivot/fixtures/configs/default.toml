[models]
scanner = "scanner-from-file"
detector = "detector-from-file"
triage = "triage-from-file"
patcher = "patcher-from-file"

[models.budget]
max_cost_usd = 9.5
max_tokens = 321000

[sandbox]
docker_image = "sandbox:test"
timeout_seconds = 45
network_enabled = false

[output]
format = "json"
output_dir = "./custom-output"

[trace]
enabled = true
file_path = ".custom-trace.jsonl"
log_prompts = true

[scan]
include_patterns = ["src/**/*.ts"]
exclude_patterns = ["dist/**"]
max_file_size = 2048

[verify]
proof_mode = "unsafe"
