[rule]
id = "custom-ldap-001"
name = "LDAP Injection in Search Filter"
cwe_id = "CWE-90"
severity = "high"
description = "User-controlled data reaches an LDAP search filter."
source_pattern = 'req\.(?:body|query|params)\.[A-Za-z_$][\w$]*'
source_type = "regex"
sink_pattern = 'client\.search\('
sink_type = "regex"
sanitizer_patterns = ['ldapEscape\(']
sanitizer_type = "regex"
message_template = "User input from `{source}` reaches `{sink}`."
tags = ["ldap", "injection"]
author = "piranesi-tests"
version = "1.0.0"
