[rule]
id = "custom-nosql-001"
name = "NoSQL Injection via MongoDB $where"
cwe_id = "CWE-943"
severity = "high"
description = "User-controlled data reaches a MongoDB $where clause."
source_pattern = 'req\.(?:body|query|params)\.[A-Za-z_$][\w$]*'
source_type = "regex"
sink_pattern = '\$where\s*:'
sink_type = "regex"
sanitizer_patterns = ['mongoSanitize\(']
sanitizer_type = "regex"
message_template = "User input from `{source}` reaches `{sink}`."
tags = ["nosql", "mongodb", "injection"]
author = "piranesi-tests"
version = "1.0.0"
