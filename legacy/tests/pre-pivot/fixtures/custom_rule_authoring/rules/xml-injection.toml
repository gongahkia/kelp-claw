[rule]
id = "custom-xml-001"
name = "XML External Entity via xml2js"
cwe_id = "CWE-611"
severity = "high"
description = "User-controlled XML reaches an unsafe parser."
source_pattern = 'req\.(?:body|query|params)\.[A-Za-z_$][\w$]*'
source_type = "regex"
sink_pattern = 'xml2js\.parseString\('
sink_type = "regex"
sanitizer_patterns = ['safeXmlParse\(']
sanitizer_type = "regex"
message_template = "User input from `{source}` reaches `{sink}`."
tags = ["xml", "xxe", "injection"]
author = "piranesi-tests"
version = "1.0.0"
