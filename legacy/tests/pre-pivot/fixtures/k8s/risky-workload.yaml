apiVersion: apps/v1
kind: Deployment
metadata:
  name: risky-web
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: risky-web
  template:
    metadata:
      labels:
        app: risky-web
    spec:
      hostNetwork: true
      containers:
        - name: web
          image: registry.example/app:vulnerable
          securityContext:
            privileged: true
            runAsUser: 0
          env:
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: risky-web
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: risky-web
  ports:
    - port: 80
      targetPort: 8080
